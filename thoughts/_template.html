<!DOCTYPE html>
<!--
  ============================================================
  STORY TEMPLATE  ·  do not publish this file directly
  ============================================================
  To add a new story:
    1. Copy this file to  thoughts/<your-slug>.html
       (slug = lowercase-words-with-dashes, becomes the URL)
    2. Replace every {{PLACEHOLDER}} below.
    3. Write the story as a series of <p>...</p> inside .post-body.
    4. Add a matching preview card to index.html (see thoughts/README.md).
    5. Add the new URL to sitemap.xml.
  Set lang on <html>:  "zh-Hans" for Chinese, "en" for English.
  ============================================================
-->
<html lang="{{LANG}}" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} &mdash; Kasen Teoh</title>

  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="author" content="Kasen Teoh">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0a0a0a">

  <link rel="canonical" href="https://kasenteoh.github.io/thoughts/{{SLUG}}.html">

  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="https://kasenteoh.github.io/thoughts/{{SLUG}}.html">
  <meta property="article:published_time" content="{{DATE}}">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">

  <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="../assets/img/kt-icon.jpeg" type="image/jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="post-page">

  <div class="post-wrap">

    <nav class="post-topbar" aria-label="Breadcrumb">
      <a class="post-back" href="../index.html#thoughts">
        <span class="pb-user">kasen</span><span class="pb-at">@</span><span class="pb-host">portfolio</span><span class="pb-sep">:</span><span class="pb-path">~/thoughts</span><span class="pb-dollar">$</span> <span class="pb-cmd">cd ..</span>
      </a>
    </nav>

    <article class="post-article">
      <header class="post-header">
        <h1 class="post-title">{{TITLE}}</h1>
        <p class="post-dek">{{DEK}}</p>
        <div class="post-meta">
          <time datetime="{{DATE}}">{{DATE}}</time>
          <span class="post-meta-sep">&middot;</span>
          <span>Kasen Teoh</span>
        </div>
      </header>

      <div class="post-body">
        <p>{{First paragraph...}}</p>
        <p>{{Next paragraph...}}</p>

        <!-- Optional emotional ending block; delete if not needed: -->
        <div class="post-coda">
          <p class="post-aside">{{quiet aside}}</p>
          <p class="post-finale">{{closing line}}</p>
        </div>
      </div>
    </article>

    <footer class="post-footer">
      <a class="inline-link" href="../index.html#thoughts">&larr; back to thoughts</a>
      <div class="status-bar">
        <span class="sb-item"><span class="sb-key">v</span>2.0.0</span>
        <span class="sb-sep">&middot;</span>
        <span class="sb-item">&copy; 2026</span>
      </div>
    </footer>

  </div>

</body>
</html>
